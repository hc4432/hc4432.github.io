<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 找不到頁面 | HC團隊</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #050505;
            --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Noto Sans TC', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        /* 內容容器：確保在小螢幕下有最大寬度限制 */
        .error-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 600px;
        }

        /* 數字 404：使用 clamp 讓字體隨螢幕大小自動縮放 */
        .error-code {
            font-size: clamp(6rem, 20vw, 10rem);
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 10px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 242, 254, 0.4));
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h2 {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            margin-bottom: 15px;
            font-weight: 700;
        }

        p {
            color: #a0a0a0;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            margin-bottom: 35px;
            line-height: 1.6;
            padding: 0 10px;
        }

        /* 返回按鈕：在手機上會稍大一點方便點擊 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 40px;
            border-radius: 50px;
            background: var(--accent-gradient);
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.3);
        }

        .back-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.6);
        }

        .countdown-text {
            margin-top: 25px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
        }

        #timer {
            color: var(--primary);
            font-weight: bold;
            padding: 0 3px;
        }

        /* 背景裝飾：在小螢幕下稍微縮小以免擋住視線 */
        .bg-glow {
            position: absolute;
            width: clamp(250px, 80vw, 500px);
            height: clamp(250px, 80vw, 500px);
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, transparent 70%);
            z-index: 1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(20px);
        }

        /* 手機端特別調整 */
        @media (max-width: 480px) {
            .back-btn {
                width: 100%;
                justify-content: center;
            }
            .countdown-text {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        
        <h2>頁面已被黑洞吸走</h2>
        <p>您要訪問的頁面目前不存在，或者已經被搬移到了另一個次元。</p>
        
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            立即返回官網
        </a>
        
        <p class="countdown-text">SYSTEM REDIRECT IN <span id="timer">10</span> SECONDS...</p>
    </div>

    <script>
        let seconds = 10;
        const timerDisplay = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            seconds--;
            timerDisplay.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                // 直接跳轉回主檔 index.html
                window.location.href = "index.html"; 
            }
        }, 1000);
    </script>
</body>
</html>
